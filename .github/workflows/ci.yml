name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types

  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e-tests:
    name: E2E smoke tests (Playwright)
    runs-on: ubuntu-latest
    env:
      # Dummy creds just for booting the dev server in CI. Real values stay in Vercel.
      CLERK_SECRET_KEY: sk_test_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_cmVsYXhlZC10dXJrZXktNjcuY2xlcmsuYWNjb3VudHMuZGV2JA
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      SANITY_PROJECT_ID: dummy
      SANITY_DATA_SET: production
      NEXT_TELEMETRY_DISABLED: '1'
      # Use the dev server, not the prod start command (which would need a real Sanity
      # dataset for static page generation). Playwright sees CI=true by default, so we
      # override the webServer command directly via PLAYWRIGHT_WEB_SERVER_COMMAND.
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run dev:next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test tests/e2e/Migration.smoke.spec.ts
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
